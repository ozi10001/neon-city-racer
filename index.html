<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON CITY RACER — ULTRA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap');

  :root {
    --cyan:#00f0ff; --purple:#7700ff; --orange:#ff7700;
    --red:#ff2244; --gold:#ffcc00; --green:#00ff88;
    --pink:#ff44cc; --bg:#000510;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:radial-gradient(ellipse at 50% 40%,#050a1a 0%,#000 70%);
    display:flex;justify-content:center;align-items:center;
    min-height:100vh;overflow:hidden;
    font-family:'Orbitron',monospace;touch-action:none;
  }

  #gw{
    position:relative;width:480px;height:700px;overflow:hidden;
    border:2px solid var(--cyan);
    box-shadow:0 0 60px #00f0ff55,0 0 120px #00f0ff22,inset 0 0 60px #00003322;
    border-radius:6px;
  }
  canvas{display:block;}

  /* ── HUD ── */
  #hud{
    position:absolute;top:0;left:0;right:0;padding:10px 14px;
    display:flex;justify-content:space-between;align-items:flex-start;
    pointer-events:none;z-index:10;
    background:linear-gradient(to bottom,rgba(0,5,20,.85) 0%,transparent 100%);
  }
  .hb{display:flex;flex-direction:column;}
  .hl{font-family:'Rajdhani',sans-serif;font-size:8px;letter-spacing:3px;color:#00f0ffaa;text-transform:uppercase;}
  .hv{font-size:20px;font-weight:900;color:#fff;line-height:1;text-shadow:0 0 10px var(--cyan),0 0 25px #00f0ff66;}

  /* Coins HUD */
  #coinHud{position:absolute;top:10px;left:50%;transform:translateX(-50%);
    z-index:11;pointer-events:none;display:flex;align-items:center;gap:6px;}
  #coinIcon{font-size:16px;}
  #coinCount{font-size:16px;font-weight:900;color:var(--gold);text-shadow:0 0 10px var(--gold);}

  /* ── BARS ── */
  #barsBottom{
    position:absolute;bottom:75px;left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-end;
    padding:0 14px;z-index:10;pointer-events:none;gap:8px;
  }
  .barGroup{display:flex;flex-direction:column;gap:3px;flex:1;}
  .barGroup.center{flex:1.2;align-items:center;}
  .barLbl{font-family:'Rajdhani',sans-serif;font-size:8px;letter-spacing:2px;color:#00f0ffaa;text-align:center;}
  .barTrack{width:100%;height:6px;background:#ffffff08;border:1px solid #00f0ff22;border-radius:3px;overflow:hidden;}
  .barFill{height:100%;border-radius:3px;transition:width .12s,background .2s;}
  #speedFill{background:linear-gradient(90deg,var(--cyan),var(--purple));}
  #boostFill{background:linear-gradient(90deg,#ff5500,#ffbb00);}
  #shieldFill{background:linear-gradient(90deg,#00aaff,#00ffcc);}

  /* Combo */
  #cd{position:absolute;top:80px;right:14px;text-align:right;z-index:10;pointer-events:none;}
  .clbl{font-family:'Rajdhani',sans-serif;font-size:8px;letter-spacing:3px;color:#ff9900aa;}
  .cv{font-size:26px;font-weight:900;color:#ff9900;text-shadow:0 0 10px #ff9900;transition:all .12s;}

  /* Lives */
  #livesRow{display:flex;gap:6px;margin-top:3px;}
  .lp{width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);}
  .lp.lost{background:#ffffff12;box-shadow:none;}

  /* ── OVERLAYS ── */
  #nmf{position:absolute;inset:0;pointer-events:none;z-index:15;opacity:0;background:radial-gradient(ellipse at center,#ff990088 0%,transparent 65%);transition:opacity .08s;}
  #htf{position:absolute;inset:0;pointer-events:none;z-index:15;opacity:0;background:rgba(255,30,30,.3);transition:opacity .08s;}
  #shieldFlash{position:absolute;inset:0;pointer-events:none;z-index:15;opacity:0;background:radial-gradient(ellipse at center,#00aaff55 0%,transparent 65%);transition:opacity .08s;}
  #magFlash{position:absolute;inset:0;pointer-events:none;z-index:15;opacity:0;background:radial-gradient(ellipse at center,#ff44cc33 0%,transparent 60%);transition:opacity .08s;}

  #nmpop{position:absolute;left:50%;transform:translateX(-50%);top:170px;z-index:18;pointer-events:none;
    font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:3px;
    color:#ffee00;text-shadow:0 0 12px #ffee00;opacity:0;transition:opacity .15s;white-space:nowrap;}
  #lvup{position:absolute;left:50%;transform:translate(-50%,-50%);top:50%;z-index:18;pointer-events:none;
    font-size:18px;font-weight:900;letter-spacing:5px;
    color:#fff;text-shadow:0 0 20px var(--cyan),0 0 40px var(--cyan);
    opacity:0;transition:opacity .15s;white-space:nowrap;}
  #weatherAlert{position:absolute;left:50%;transform:translateX(-50%);top:140px;z-index:18;pointer-events:none;
    font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:4px;
    opacity:0;transition:opacity .2s;white-space:nowrap;text-align:center;}
  #powerupPop{position:absolute;left:50%;transform:translateX(-50%);top:200px;z-index:18;pointer-events:none;
    font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:3px;
    opacity:0;transition:opacity .15s;white-space:nowrap;}

  /* Active powerup icons */
  #powerupIcons{position:absolute;top:60px;left:14px;z-index:11;pointer-events:none;display:flex;flex-direction:column;gap:4px;}
  .pui{font-size:18px;padding:3px 7px;border-radius:4px;border:1px solid;font-family:'Rajdhani',sans-serif;font-size:11px;display:flex;align-items:center;gap:4px;letter-spacing:1px;}
  .pui.shield{background:#00aaff22;border-color:#00aaff55;color:#00aaff;}
  .pui.magnet{background:#ff44cc22;border-color:#ff44cc55;color:#ff44cc;}
  .pui.x2{background:#ffcc0022;border-color:#ffcc0055;color:#ffcc00;}

  /* Weather overlay canvas */
  #weatherCanvas{position:absolute;inset:0;pointer-events:none;z-index:8;}

  /* ── MAIN OVERLAY ── */
  #ov{
    position:absolute;inset:0;display:flex;flex-direction:column;
    justify-content:center;align-items:center;z-index:20;
    background:linear-gradient(180deg,rgba(0,0,30,.95) 0%,rgba(0,0,10,.98) 100%);
    backdrop-filter:blur(4px);
  }
  #ov h1{font-size:42px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 25px var(--cyan),0 0 60px #00f0ff44;margin-bottom:2px;}
  .sub{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:10px;color:#00f0ffcc;margin-bottom:20px;}
  .sbig{font-size:52px;font-weight:900;color:#fff;text-shadow:0 0 25px var(--purple),0 0 50px #7700ff66;margin-bottom:2px;}
  .btn{
    margin-top:12px;padding:12px 48px;
    background:transparent;border:2px solid var(--cyan);
    color:var(--cyan);font-family:'Orbitron',monospace;font-size:13px;font-weight:700;
    letter-spacing:4px;cursor:pointer;transition:all .2s;text-transform:uppercase;
    box-shadow:0 0 20px #00f0ff44;user-select:none;
  }
  .btn:hover,.btn:active{background:#00f0ff22;box-shadow:0 0 40px #00f0ff99;transform:scale(1.04);}
  .btn.secondary{border-color:var(--gold);color:var(--gold);box-shadow:0 0 20px #ffcc0044;}
  .btn.secondary:hover{background:#ffcc0022;box-shadow:0 0 40px var(--gold);}
  .ch{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;color:#ffffff33;margin-top:12px;}
  .hirow{display:flex;gap:20px;margin-top:6px;}
  .hibox{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .hilbl{font-family:'Rajdhani',sans-serif;font-size:8px;letter-spacing:2px;color:#aa88ff77;}
  .hival{font-size:16px;font-weight:700;color:#aa88ff;}

  /* ── SHOP ── */
  #shopOv{
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;z-index:25;padding:14px;
    background:linear-gradient(180deg,rgba(0,0,30,.97) 0%,rgba(0,0,10,.99) 100%);
    backdrop-filter:blur(6px);overflow-y:auto;
  }
  #shopOv.open{display:flex;}
  #shopOv h2{font-size:26px;font-weight:900;letter-spacing:6px;color:var(--gold);text-shadow:0 0 20px var(--gold);margin:8px 0 4px;}
  #shopCoins{font-family:'Rajdhani',sans-serif;font-size:14px;color:var(--gold);margin-bottom:12px;letter-spacing:2px;}
  .shopGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
  .shopItem{
    background:#ffffff05;border:1px solid #00f0ff22;border-radius:6px;
    padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;
    cursor:pointer;transition:all .2s;
  }
  .shopItem:hover{background:#00f0ff0a;border-color:#00f0ff66;transform:scale(1.02);}
  .shopItem.maxed{border-color:#ffcc0066;background:#ffcc0008;cursor:default;}
  .shopItem.locked{opacity:.45;cursor:not-allowed;}
  .siIcon{font-size:26px;}
  .siName{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:#fff;text-align:center;}
  .siDesc{font-family:'Rajdhani',sans-serif;font-size:9px;color:#ffffff55;text-align:center;line-height:1.3;}
  .siLevel{display:flex;gap:3px;margin-top:2px;}
  .siDot{width:8px;height:4px;border-radius:2px;background:#ffffff15;}
  .siDot.filled{background:var(--cyan);box-shadow:0 0 4px var(--cyan);}
  .siCost{font-size:11px;font-weight:700;color:var(--gold);font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
  .shopClose{margin-top:12px;padding:10px 36px;background:transparent;border:1px solid #ffffff33;
    color:#ffffff88;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;cursor:pointer;transition:all .2s;}
  .shopClose:hover{border-color:#fff;color:#fff;}

  /* ── MISSION BANNER ── */
  #missionBar{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);
    z-index:12;pointer-events:none;
    font-family:'Rajdhani',sans-serif;font-size:9px;letter-spacing:2px;
    color:#ffffffaa;white-space:nowrap;display:flex;align-items:center;gap:6px;}
  #missionProgress{width:70px;height:4px;background:#ffffff08;border-radius:2px;overflow:hidden;}
  #missionFill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .3s;}

  /* ── MOBILE CONTROLS ── */
  #mctrls{
    position:absolute;bottom:0;left:0;right:0;height:72px;
    display:none;z-index:30;
  }
  #mctrls.visible{display:flex;}
  .mBtn{
    flex:1;display:flex;align-items:center;justify-content:center;
    pointer-events:all;cursor:pointer;user-select:none;
    background:rgba(0,240,255,.04);border-top:1px solid #00f0ff22;
    font-size:26px;color:#00f0ff55;transition:background .1s;
    -webkit-tap-highlight-color:transparent;
  }
  .mBtn:active{background:rgba(0,240,255,.16);}
  #mBoost{flex:0 0 110px;background:rgba(255,150,0,.06);border-top:1px solid #ff990033;color:#ff990066;font-size:18px;}
  #mBoost:active{background:rgba(255,150,0,.2);}
  #mShop{flex:0 0 60px;background:rgba(255,200,0,.06);border-top:1px solid #ffcc0033;font-size:20px;color:#ffcc0066;}
  #mShop:active{background:rgba(255,200,0,.16);}
</style>
</head>
<body>
<div id="gw">
  <canvas id="gc" width="480" height="700"></canvas>
  <canvas id="weatherCanvas" width="480" height="700"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hb"><span class="hl">Score</span><span class="hv" id="sv">0</span></div>
    <div class="hb" style="align-items:center;"><span class="hl">Nivel</span><span class="hv" id="lv">1</span></div>
    <div class="hb" style="align-items:flex-end;"><span class="hl">Vidas</span>
      <div id="livesRow"><div class="lp" id="l1"></div><div class="lp" id="l2"></div><div class="lp" id="l3"></div></div>
    </div>
  </div>

  <div id="coinHud"><span id="coinIcon">🪙</span><span id="coinCount">0</span></div>
  <div id="cd"><div class="clbl">COMBO</div><div class="cv" id="cmv">x1</div></div>

  <div id="powerupIcons"></div>

  <div id="barsBottom">
    <div class="barGroup">
      <div class="barLbl">VELOCIDAD</div>
      <div class="barTrack"><div class="barFill" id="speedFill" style="width:20%"></div></div>
      <div class="barLbl">TURBO</div>
      <div class="barTrack"><div class="barFill" id="boostFill" style="width:0%"></div></div>
    </div>
    <div class="barGroup" style="align-items:flex-end;">
      <div class="barLbl">ESCUDO</div>
      <div class="barTrack"><div class="barFill" id="shieldFill" style="width:0%;background:linear-gradient(90deg,#00aaff,#00ffcc)"></div></div>
    </div>
  </div>

  <div id="missionBar">
    🎯 <span id="missionText">Esquiva 5 autos</span>
    <div id="missionProgress"><div id="missionFill" style="width:0%"></div></div>
    <span id="missionVal">0/5</span>
  </div>

  <!-- flashes -->
  <div id="nmf"></div><div id="htf"></div><div id="shieldFlash"></div><div id="magFlash"></div>
  <div id="nmpop">¡CASI! +COMBO</div>
  <div id="lvup">⬆ NIVEL UP</div>
  <div id="weatherAlert"></div>
  <div id="powerupPop"></div>

  <!-- MAIN OVERLAY -->
  <div id="ov">
    <h1>NEON CITY</h1>
    <div class="sub">RACER — ULTRA</div>
    <div class="hirow">
      <div class="hibox"><div class="hilbl">RÉCORD</div><div class="hival" id="hisc">0</div></div>
      <div class="hibox"><div class="hilbl">MEJOR NIV</div><div class="hival" id="hilv">1</div></div>
      <div class="hibox"><div class="hilbl">MONEDAS</div><div class="hival" id="hiCoins">0</div></div>
    </div>
    <div class="btn" id="sbtn" onclick="startGame()">INICIAR</div>
    <div class="btn secondary" onclick="openShop()" style="margin-top:6px;font-size:11px;padding:10px 36px;">🛒 MEJORAS</div>
    <div class="ch">← → MOVER &nbsp;|&nbsp; ESPACIO TURBO &nbsp;|&nbsp; S TIENDA</div>
  </div>

  <!-- SHOP OVERLAY -->
  <div id="shopOv">
    <h2>🛒 TIENDA</h2>
    <div id="shopCoins">🪙 <span id="shopCoinVal">0</span> monedas</div>
    <div class="shopGrid" id="shopGrid"></div>
    <button class="shopClose" onclick="closeShop()">◀ VOLVER</button>
  </div>

  <!-- Mobile Controls -->
  <div id="mctrls">
    <div class="mBtn" id="mLeft" ontouchstart="handleTouch('left','down')" ontouchend="handleTouch('left','up')">◀</div>
    <div class="mBtn" id="mBoost" ontouchstart="handleTouch('boost','down')" ontouchend="handleTouch('boost','up')">⚡ TURBO</div>
    <div class="mBtn" id="mShop" ontouchstart="openShop()">🛒</div>
    <div class="mBtn" id="mRight" ontouchstart="handleTouch('right','down')" ontouchend="handleTouch('right','up')">▶</div>
  </div>
</div>

<script>
/* ═══════════════ CANVAS & CONSTANTS ═══════════════ */
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d'),W=480,H=700;
const wCanvas=document.getElementById('weatherCanvas'),wCtx=wCanvas.getContext('2d');
const RX=60,RW=360,LW=RW/3;
const lanes=[RX+LW*.5,RX+LW*1.5,RX+LW*2.5];

/* ═══════════════ PERSISTENCE ═══════════════ */
let hiScore=parseInt(localStorage.getItem('ncr2HiScore')||'0');
let hiLevel=parseInt(localStorage.getItem('ncr2HiLevel')||'1');
let totalCoins=parseInt(localStorage.getItem('ncr2Coins')||'0');
let upgrades=JSON.parse(localStorage.getItem('ncr2Upgrades')||'{}');

function saveData(){
  localStorage.setItem('ncr2HiScore',hiScore);
  localStorage.setItem('ncr2HiLevel',hiLevel);
  localStorage.setItem('ncr2Coins',totalCoins);
  localStorage.setItem('ncr2Upgrades',JSON.stringify(upgrades));
}

/* ═══════════════ UPGRADE DEFINITIONS ═══════════════ */
const UPGRADE_DEFS=[
  {id:'engine',  icon:'🔧',name:'MOTOR',     desc:'Más velocidad base',    maxLv:5, costs:[80,160,280,450,700], effect:'engine'},
  {id:'turbo',   icon:'⚡',name:'TURBO',      desc:'Más duración turbo',    maxLv:5, costs:[60,120,220,380,600], effect:'turbo'},
  {id:'shield',  icon:'🛡️',name:'ESCUDO',     desc:'Absorbe 1 impacto',     maxLv:3, costs:[100,250,500],        effect:'shield'},
  {id:'magnet',  icon:'🧲',name:'IMÁN',       desc:'Atrae monedas cercanas', maxLv:3, costs:[80,200,400],         effect:'magnet'},
  {id:'coinMult',icon:'🪙',name:'MONEDERO',   desc:'Más valor por moneda',   maxLv:4, costs:[70,180,350,600],     effect:'coinMult'},
  {id:'lives',   icon:'❤️',name:'VIDA EXTRA', desc:'Empieza con +1 vida',    maxLv:2, costs:[200,500],             effect:'lives'},
  {id:'nitroRgn',icon:'💨',name:'NITRO+',     desc:'Nitro se recarga más rápido',maxLv:4,costs:[60,140,280,500], effect:'nitroRgn'},
  {id:'bodykit', icon:'🏎️',name:'BODYKIT',    desc:'Hitbox reducida (-15%)', maxLv:3, costs:[120,300,600],         effect:'bodykit'},
];

function getUpgLv(id){return upgrades[id]||0;}
function getUpgVal(id){
  const lv=getUpgLv(id);
  switch(id){
    case 'engine':   return 1+lv*0.18;
    case 'turbo':    return 1+lv*0.22;
    case 'shield':   return lv;
    case 'magnet':   return lv*40;
    case 'coinMult': return 1+lv*0.4;
    case 'lives':    return lv;
    case 'nitroRgn': return 1+lv*0.35;
    case 'bodykit':  return lv*0.05;
    default: return 0;
  }
}

/* ═══════════════ GAME STATE ═══════════════ */
let state='menu';
let score=0,level=1,lives=3,combo=1;
let gspd=3,bspd=3,fc=0,spawnT=0,boostChg=0,boosting=false,inv=0;
let bgO=0,dashO=0;
let sessionCoins=0; // coins collected this run
let rafId=null;
let weather='clear'; // clear, rain, fog, storm
let weatherTimer=0;
let fogAlpha=0;
let rainDrops=[];
let lightning={active:false,timer:0};

// Powerups state
let shieldActive=0;  // frames remaining
let magnetActive=0;
let x2Active=0;

// Missions
const MISSIONS=[
  {text:'Esquiva 5 autos',   key:'dodges',   target:5,  reward:30,  unit:'auto'},
  {text:'Recoge 10 monedas', key:'coinsR',   target:10, reward:25,  unit:'moneda'},
  {text:'Combo x5',          key:'maxCombo', target:5,  reward:40,  unit:'combo'},
  {text:'Llega al nivel 3',  key:'level',    target:3,  reward:50,  unit:'nivel'},
  {text:'Viaja 2000m',       key:'dist',     target:2000,reward:35, unit:'m'},
  {text:'Usa Turbo 5 veces', key:'turbos',   target:5,  reward:30,  unit:'vez'},
  {text:'Sobrevive al nivel 5',key:'level',  target:5,  reward:80,  unit:'nivel'},
  {text:'Recoge 20 monedas', key:'coinsR',   target:20, reward:60,  unit:'moneda'},
];
let currentMission=null;
let missionStats={dodges:0,coinsR:0,maxCombo:0,level:1,dist:0,turbos:0};
let missionComplete=false;

// Obstacle types
let obstacles=[];   // {x,y,w,h,type,speed,lane}
const OBS_TYPES=['barrel','cone','truck','oil'];

const keys={};
let cars=[],parts=[],sparks=[],coins=[],buildings=[],powerupItems=[];
const player={x:W/2,y:H-130,w:42,h:72,lane:1,targetX:W/2,tilt:0};

const TCOLS=[
  ['#ff3355','#cc0022'],['#00d4ff','#0088aa'],['#aaff00','#668800'],
  ['#ff9900','#cc6600'],['#aa44ff','#6600cc'],['#eeeeee','#999999'],
  ['#ff66cc','#aa2288'],['#00ffcc','#008866'],['#ff6633','#cc3300'],
  ['#33ffee','#009988'],['#ffaa33','#cc7700'],['#7733ff','#4400cc'],
];

/* ═══════════════ MOBILE ═══════════════ */
const isMobile=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
if(isMobile)document.getElementById('mctrls').classList.add('visible');

function handleTouch(btn,dir){
  if(btn==='left'  && dir==='down' && state==='playing') moveLane(-1);
  if(btn==='right' && dir==='down' && state==='playing') moveLane(1);
  if(btn==='boost') keys['Space']=(dir==='down');
}

/* ═══════════════ KEYBOARD ═══════════════ */
document.addEventListener('keydown',e=>{
  if(keys[e.code])return;
  keys[e.code]=true;
  if(e.code==='ArrowLeft' && state==='playing') moveLane(-1);
  if(e.code==='ArrowRight'&& state==='playing') moveLane(1);
  if(e.code==='Space'){e.preventDefault();}
  if(e.code==='KeyR' && state==='gameover') startGame();
  if(e.code==='KeyS'){
    if(document.getElementById('shopOv').classList.contains('open')) closeShop();
    else openShop();
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// Swipe
let touchStartX=null;
document.getElementById('gw').addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].clientX;},{passive:true});
document.getElementById('gw').addEventListener('touchend',e=>{
  if(touchStartX===null)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>30&&state==='playing'){moveLane(dx>0?1:-1);}
  touchStartX=null;
},{passive:true});

/* ═══════════════ SHOP ═══════════════ */
function openShop(){
  const wasPlaying=(state==='playing');
  if(wasPlaying){state='paused';cancelAnimationFrame(rafId);rafId=null;}
  renderShop();
  document.getElementById('shopOv').classList.add('open');
}
function closeShop(){
  document.getElementById('shopOv').classList.remove('open');
  if(state==='paused'){state='playing';rafId=requestAnimationFrame(loop);}
}
function renderShop(){
  document.getElementById('shopCoinVal').textContent=totalCoins.toLocaleString();
  const grid=document.getElementById('shopGrid');
  grid.innerHTML='';
  UPGRADE_DEFS.forEach(def=>{
    const lv=getUpgLv(def.id);
    const maxed=lv>=def.maxLv;
    const cost=maxed?0:def.costs[lv];
    const canAfford=totalCoins>=cost;
    const el=document.createElement('div');
    el.className='shopItem'+(maxed?' maxed':'')+((!canAfford&&!maxed)?' locked':'');
    // Level dots
    let dots='';
    for(let i=0;i<def.maxLv;i++) dots+=`<div class="siDot${i<lv?' filled':''}"></div>`;
    el.innerHTML=`
      <div class="siIcon">${def.icon}</div>
      <div class="siName">${def.name}</div>
      <div class="siDesc">${def.desc}</div>
      <div class="siLevel">${dots}</div>
      <div class="siCost">${maxed?'✅ MAX':(!canAfford?'🔒':'🪙 '+cost)}</div>
    `;
    if(!maxed&&canAfford){
      el.onclick=()=>{
        totalCoins-=cost;
        upgrades[def.id]=(upgrades[def.id]||0)+1;
        saveData();
        renderShop();
        // mini feedback
        el.style.transform='scale(1.1)';
        setTimeout(()=>el.style.transform='',200);
      };
    }
    grid.appendChild(el);
  });
}

/* ═══════════════ MISSIONS ═══════════════ */
function pickMission(){
  currentMission=MISSIONS[Math.floor(Math.random()*MISSIONS.length)];
  missionStats={dodges:0,coinsR:0,maxCombo:1,level:1,dist:0,turbos:0};
  missionComplete=false;
  updateMissionUI();
}
function updateMissionUI(){
  if(!currentMission)return;
  const val=missionStats[currentMission.key]||0;
  const pct=Math.min(100,(val/currentMission.target)*100);
  document.getElementById('missionText').textContent=currentMission.text;
  document.getElementById('missionVal').textContent=Math.min(val,currentMission.target)+'/'+currentMission.target;
  document.getElementById('missionFill').style.width=pct+'%';
}
function checkMission(){
  if(!currentMission||missionComplete)return;
  const val=missionStats[currentMission.key]||0;
  if(val>=currentMission.target){
    missionComplete=true;
    totalCoins+=currentMission.reward;
    sessionCoins+=currentMission.reward;
    saveData();
    showPopup(`🎯 MISIÓN: +${currentMission.reward} 🪙`,'#00ff88');
    setTimeout(()=>{pickMission();},3000);
  }
}

/* ═══════════════ WEATHER ═══════════════ */
const WEATHERS=['clear','rain','fog','storm'];
const WEATHER_NAMES={clear:'☀️ DESPEJADO',rain:'🌧️ LLUVIA',fog:'🌫️ NIEBLA',storm:'⛈️ TORMENTA'};

function setWeather(w){
  weather=w;
  rainDrops=[];
  if(w!=='clear'){
    showWeatherAlert(WEATHER_NAMES[w]);
  }
  if(w==='rain'||w==='storm'){
    for(let i=0;i<120;i++) rainDrops.push(makeRainDrop());
  }
}
function makeRainDrop(){
  return {x:Math.random()*W,y:Math.random()*H,vy:8+Math.random()*6,vx:-.5,len:8+Math.random()*8,alpha:0.2+Math.random()*0.4};
}
function showWeatherAlert(msg){
  const el=document.getElementById('weatherAlert');
  el.textContent=msg;
  el.style.color=weather==='storm'?'#ff3366':weather==='fog'?'#aabbcc':'#33aaff';
  el.style.textShadow=`0 0 12px ${weather==='storm'?'#ff3366':weather==='fog'?'#aabbcc':'#33aaff'}`;
  el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',2200);
}
function drawWeather(){
  wCtx.clearRect(0,0,W,H);
  if(weather==='fog'||weather==='storm'){
    const fa=weather==='storm'?0.28:0.18;
    fogAlpha+=(fa-fogAlpha)*.04;
    wCtx.fillStyle=`rgba(180,200,220,${fogAlpha})`;
    wCtx.fillRect(0,0,W,H);
  } else {fogAlpha*=.95;}
  if(weather==='rain'||weather==='storm'){
    wCtx.strokeStyle='rgba(150,200,255,0.4)';
    wCtx.lineWidth=1;
    rainDrops.forEach(d=>{
      d.y+=d.vy;d.x+=d.vx;
      if(d.y>H){d.y=-10;d.x=Math.random()*W;}
      wCtx.globalAlpha=d.alpha;
      wCtx.beginPath();wCtx.moveTo(d.x,d.y);wCtx.lineTo(d.x+d.vx*2,d.y+d.len);wCtx.stroke();
    });
    wCtx.globalAlpha=1;
  }
  if(weather==='storm'){
    lightning.timer--;
    if(lightning.timer<=0){
      if(!lightning.active){
        lightning.active=true;lightning.timer=3+Math.floor(Math.random()*4);
        // flash
        wCtx.fillStyle='rgba(255,255,255,0.15)';wCtx.fillRect(0,0,W,H);
      } else {
        lightning.active=false;
        lightning.timer=60+Math.floor(Math.random()*120);
      }
    }
    if(lightning.active){
      // draw lightning bolt
      wCtx.strokeStyle='rgba(255,255,180,0.9)';wCtx.lineWidth=2;
      const lx=RX+Math.random()*RW;
      wCtx.beginPath();let cy=0,cx=lx;
      while(cy<H){wCtx.lineTo(cx+(Math.random()-.5)*30,cy);cy+=30+Math.random()*20;}
      wCtx.stroke();
    }
  }
}

function initBuild(){

      x:side?Math.random()*45:RX+RW+4+Math.random()*40,

/* ═══════════════ DRAW ROAD ═══════════════ */
function drawRoad(){
  const g=ctx.createLinearGradient(RX,0,RX+RW,0);
  g.addColorStop(0,'#070c11');g.addColorStop(.5,'#0d1720');g.addColorStop(1,'#070c11');
  ctx.fillStyle=g;ctx.fillRect(RX,0,RW,H);
  // sidewalks
  const sg=ctx.createLinearGradient(0,0,RX,0);sg.addColorStop(0,'#0a0f14');sg.addColorStop(1,'#111820');
  ctx.fillStyle=sg;ctx.fillRect(0,0,RX,H);
  const sg2=ctx.createLinearGradient(RX+RW,0,W,0);sg2.addColorStop(0,'#111820');sg2.addColorStop(1,'#0a0f14');
  ctx.fillStyle=sg2;ctx.fillRect(RX+RW,0,W-RX-RW,H);

  // road glow
  ctx.shadowColor='#00f0ff';ctx.shadowBlur=10;
  ctx.strokeStyle='#00f0ff66';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(RX,0);ctx.lineTo(RX,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(RX+RW,0);ctx.lineTo(RX+RW,H);ctx.stroke();
  ctx.shadowBlur=0;

  // lane dividers
  dashO=(dashO+gspd)%60;
  ctx.strokeStyle='#ffffff10';ctx.lineWidth=2;ctx.setLineDash([28,32]);ctx.lineDashOffset=-dashO;
  for(let l=1;l<3;l++){ctx.beginPath();ctx.moveTo(RX+LW*l,0);ctx.lineTo(RX+LW*l,H);ctx.stroke();}
  ctx.setLineDash([]);

  // wet road reflection (rain/storm)
  if(weather==='rain'||weather==='storm'){
    const wr=ctx.createLinearGradient(RX,H*.6,RX,H);
    wr.addColorStop(0,'transparent');wr.addColorStop(1,'rgba(0,180,255,0.06)');
    ctx.fillStyle=wr;ctx.fillRect(RX,H*.6,RW,H*.4);
  }

  // street lamps
  [RX-10,RX+RW+10].forEach((lx,si)=>{
    for(let ly=(dashO*2.1)%190-190;ly<H+10;ly+=190){
      const ox=si===0?14:-14;
      ctx.strokeStyle='#252f40';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+ox,ly-25);ctx.stroke();
      const lampColor=weather==='storm'?'#ffaaaa':'#ffee88';
      ctx.fillStyle=lampColor;ctx.shadowColor=lampColor+'77';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(lx+ox,ly-27,3.5,0,Math.PI*2);ctx.fill();
      const lcg=ctx.createRadialGradient(lx+ox,ly-27,0,lx+ox,ly-27,55);
      lcg.addColorStop(0,weather==='storm'?'rgba(255,170,170,.07)':'rgba(255,238,136,.07)');lcg.addColorStop(1,'transparent');
      ctx.fillStyle=lcg;ctx.beginPath();ctx.moveTo(lx+ox,ly-27);ctx.lineTo(lx+ox-30,ly+32);ctx.lineTo(lx+ox+30,ly+32);ctx.fill();
      ctx.shadowBlur=0;
    }
  });
}

/* ═══════════════ DRAW BUILDINGS ═══════════════ */
function drawBuildings(){
  buildings.forEach(b=>{
    const by=(b.y+bgO*.28)%(H+b.h)-b.h;
    ctx.fillStyle=`hsl(${b.hue},22%,5%)`;ctx.fillRect(b.x,by,b.w,b.h);
    ctx.strokeStyle=`hsla(${b.hue},70%,55%,.25)`;ctx.lineWidth=1;ctx.strokeRect(b.x,by,b.w,b.h);
    if(b.hue===180||b.hue===270||b.hue===10){
      const sx=b.x+b.w/2,sy=by+10;
      ctx.shadowColor=`hsl(${b.hue},100%,65%)`;ctx.shadowBlur=6;
      ctx.strokeStyle=`hsla(${b.hue},100%,65%,.5)`;ctx.lineWidth=1;
      ctx.strokeRect(sx-8,sy,16,5);ctx.shadowBlur=0;
    }
    b.wins.forEach(w=>{
      if(w.on){
        const a=weather==='storm'?(0.1+Math.sin(fc*.025+w.phase)*.3):(.35+Math.sin(fc*.007+w.phase)*.17);
        ctx.fillStyle=`hsla(${b.hue+30},90%,78%,${Math.max(0,a)})`;
        ctx.fillRect(b.x+w.dx,by+w.dy,5,4);
      }
    });
  });
}

/* ═══════════════ DRAW CAR ═══════════════ */
function drawCar(cx,cy,cw,ch,bc,rc,isP=false,tilt=0,type='car'){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(tilt);
  if(type==='truck'){drawTruck(cw,ch,bc,rc);}
  else {
    // shadow
    ctx.globalAlpha=.2;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(0,ch*.38,cw*.44,9,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    // body
    ctx.fillStyle=bc;ctx.beginPath();ctx.roundRect(-cw/2,-ch/2,cw,ch,[6,6,9,9]);ctx.fill();
    // roof
    ctx.fillStyle=rc;ctx.beginPath();ctx.roundRect(-cw*.37,-ch/2+ch*.13,cw*.74,ch*.4,5);ctx.fill();
    // windshield
    ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.roundRect(-cw*.28,-ch/2+ch*.15,cw*.56,ch*.17,3);ctx.fill();
    // lights
    const ly=isP?ch/2-8:-ch/2+8,lc=isP?'#ffeeaa':'#ff2222',gc2=isP?'#ffeeaaaa':'#ff2222aa';
    [-cw*.3,cw*.3].forEach(lx=>{
      ctx.shadowColor=gc2;ctx.shadowBlur=14;ctx.fillStyle=lc;
      ctx.beginPath();ctx.ellipse(lx,ly,4,3,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    });
    // wheels
    ctx.fillStyle='#111';
    [[-cw*.48,-ch*.3],[cw*.48,-ch*.3],[-cw*.48,ch*.28],[cw*.48,ch*.28]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.ellipse(wx,wy,5,7,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.stroke();
      ctx.strokeStyle='#888';ctx.lineWidth=.5;ctx.beginPath();ctx.arc(wx,wy,2.5,0,Math.PI*2);ctx.stroke();
    });
    // player glow / shield
    if(isP){
      if(shieldActive>0){
        const sa=.5+Math.sin(fc*.18)*.4;
        ctx.globalAlpha=sa;ctx.strokeStyle='#00aaff';ctx.lineWidth=3;ctx.shadowColor='#00aaff';ctx.shadowBlur=20;
        ctx.beginPath();ctx.ellipse(0,0,cw*.72,ch*.58,0,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;
      }
      if(boosting){
        ctx.shadowColor='#ff8800';ctx.shadowBlur=22;ctx.strokeStyle='#ffaa00';ctx.lineWidth=2;
        ctx.beginPath();ctx.roundRect(-cw/2-2,-ch/2-2,cw+4,ch+4,10);ctx.stroke();ctx.shadowBlur=0;
      } else {
        ctx.shadowColor='#00f0ff';ctx.shadowBlur=8;ctx.strokeStyle='#00f0ff44';ctx.lineWidth=1;
        ctx.beginPath();ctx.roundRect(-cw/2-1,-ch/2-1,cw+2,ch+2,9);ctx.stroke();ctx.shadowBlur=0;
      }
      if(magnetActive>0){
        ctx.globalAlpha=.3+Math.sin(fc*.12)*.2;
        ctx.strokeStyle='#ff44cc';ctx.lineWidth=1;ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.ellipse(0,0,cw,ch*.75,0,0,Math.PI*2);ctx.stroke();
        ctx.setLineDash([]);ctx.globalAlpha=1;
      }
      if(inv>0&&Math.floor(inv/5)%2===0){
        ctx.globalAlpha=.6;ctx.strokeStyle='#00f0ff';ctx.lineWidth=3;ctx.shadowColor='#00f0ff';ctx.shadowBlur=18;
        ctx.beginPath();ctx.roundRect(-cw/2-4,-ch/2-4,cw+8,ch+8,12);ctx.stroke();ctx.shadowBlur=0;
      }
    }
  }
  ctx.restore();
}

function drawTruck(cw,ch,bc,rc){
  const tw=cw*1.35,th=ch*1.5;
  ctx.globalAlpha=.2;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,th*.35,tw*.44,10,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle=bc;ctx.beginPath();ctx.roundRect(-tw/2,-th/2,tw,th,[4,4,8,8]);ctx.fill();
  ctx.fillStyle=rc;ctx.beginPath();ctx.roundRect(-tw*.42,-th/2+th*.12,tw*.84,th*.28,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(-tw*.32,-th/2+th*.14,tw*.64,th*.13,3);ctx.fill();
  [-tw*.44,tw*.44].forEach(lx=>{
    ctx.shadowColor='#ff2222aa';ctx.shadowBlur=14;ctx.fillStyle='#ff2222';
    ctx.beginPath();ctx.ellipse(lx,-th/2+8,5,4,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  });
  // extra wheels
  ctx.fillStyle='#111';
  [[-tw*.52,-th*.32],[tw*.52,-th*.32],[-tw*.52,th*.25],[tw*.52,th*.25],[-tw*.52,0],[tw*.52,0]].forEach(([wx,wy])=>{
    ctx.beginPath();ctx.ellipse(wx,wy,6,9,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.stroke();
  });
}

/* ═══════════════ DRAW OBSTACLES ═══════════════ */
function drawObstacle(o){
  ctx.save();ctx.translate(o.x,o.y);
  if(o.type==='barrel'){
    ctx.fillStyle='#cc4400';ctx.beginPath();ctx.ellipse(0,0,14,10,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6622';ctx.beginPath();ctx.roundRect(-12,-16,24,20,3);ctx.fill();
    ctx.strokeStyle='#884400';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-12,-8);ctx.lineTo(12,-8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-12,-2);ctx.lineTo(12,-2);ctx.stroke();
    ctx.shadowColor='#ff4400';ctx.shadowBlur=8;ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(0,-16,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  } else if(o.type==='cone'){
    ctx.fillStyle='#ff6600';ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(-11,10);ctx.lineTo(11,10);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(-11,0,22,4);ctx.fillRect(-11,-10,22,4);
    ctx.fillStyle='#333';ctx.beginPath();ctx.ellipse(0,10,11,5,0,0,Math.PI*2);ctx.fill();
  } else if(o.type==='oil'){
    const og=ctx.createRadialGradient(0,0,0,0,0,18);
    og.addColorStop(0,'rgba(80,0,120,0.85)');og.addColorStop(.5,'rgba(120,0,180,0.6)');og.addColorStop(1,'transparent');
    ctx.fillStyle=og;ctx.beginPath();ctx.ellipse(0,0,18,10,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(200,0,255,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(0,0,18,10,0,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

/* ═══════════════ DRAW POWERUP ITEM ═══════════════ */
function drawPowerupItem(p){
  ctx.save();ctx.translate(p.x,p.y);
  ctx.rotate(p.anim);
  const glow=p.type==='shield'?'#00aaff':p.type==='magnet'?'#ff44cc':'#ffcc00';
  ctx.shadowColor=glow;ctx.shadowBlur=18+Math.sin(fc*.1)*8;
  ctx.fillStyle=glow;
  ctx.beginPath();
  if(p.type==='x2'){
    // Star shape
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2-Math.PI/2;
      const a2=a+Math.PI/5;
      i===0?ctx.moveTo(Math.cos(a)*12,Math.sin(a)*12):ctx.lineTo(Math.cos(a)*12,Math.sin(a)*12);
      ctx.lineTo(Math.cos(a2)*6,Math.sin(a2)*6);
    }ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.font='bold 8px Orbitron';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowBlur=0;ctx.fillStyle='#000';ctx.fillText('X2',0,0);
  } else {
    ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.font='12px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowBlur=0;ctx.fillText(p.type==='shield'?'🛡':'🧲',0,1);
  }
  ctx.shadowBlur=0;ctx.restore();
}

function updateParticles(){
  parts=parts.filter(p=>{
    p.x+=p.vx;p.y+=p.vy*.5+gspd*.28;p.life-=.05;

    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.1,p.r*p.life),0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    return p.life>0;
  });
  sparks=sparks.filter(s=>{
    s.x+=s.vx;s.y+=s.vy;s.vy+=.2;s.life-=.04;
    ctx.globalAlpha=s.life;ctx.fillStyle=s.color;ctx.shadowColor=s.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;
    return s.life>0;
  });
}

/* ═══════════════ UPDATE COINS ═══════════════ */
function updateCoins(){
  const magR=getUpgVal('magnet')+(magnetActive>0?80:0);
  coins=coins.filter(c=>{
    c.y+=gspd;c.anim+=.12;
    // magnet pull
    if(magR>0){
      const dx=player.x-c.x,dy=player.y-c.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<magR){c.x+=dx*.1;c.y+=dy*.1;}
    }
    const dx=c.x-player.x,dy=c.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<c.r+18){
      const val=Math.round(c.val*(x2Active>0?2:1));
      score+=val*combo*5;
      sessionCoins+=1;totalCoins+=1;
      boostChg=Math.min(100,boostChg+18*getUpgVal('nitroRgn'));
      missionStats.coinsR=(missionStats.coinsR||0)+1;
      checkMission();updateMissionUI();
      for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2;sparks.push({x:c.x,y:c.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:.9,r:2,color:'#ffcc00'});}
      return false;
    }
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.anim);
    ctx.fillStyle='#ffcc00';ctx.shadowColor='#ffcc00';ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(0,0,c.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.ellipse(-2.5,-2.5,3,5,-.45,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
    return c.y<H+25;
  });
}

/* ═══════════════ UPDATE POWERUP ITEMS ═══════════════ */
function updatePowerupItems(){
  powerupItems=powerupItems.filter(p=>{
    p.y+=gspd*.8;p.anim+=.05;
    const dx=p.x-player.x,dy=p.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<p.r+20){
      applyPowerup(p.type);
      return false;
    }
    drawPowerupItem(p);
    return p.y<H+30;
  });
}
function applyPowerup(type){
  if(type==='shield'){shieldActive=600;showPopup('🛡️ ESCUDO ACTIVO!','#00aaff');}
  else if(type==='magnet'){magnetActive=400;document.getElementById('magFlash').style.opacity='1';setTimeout(()=>document.getElementById('magFlash').style.opacity='0',300);showPopup('🧲 IMÁN ACTIVO!','#ff44cc');}
  else if(type==='x2'){x2Active=500;showPopup('✨ X2 PUNTOS!','#ffcc00');}
  updatePowerupHUD();
}
function updatePowerupHUD(){
  const c=document.getElementById('powerupIcons');c.innerHTML='';
  if(shieldActive>0) c.innerHTML+=`<div class="pui shield">🛡️ ${Math.ceil(shieldActive/60)}s</div>`;
  if(magnetActive>0) c.innerHTML+=`<div class="pui magnet">🧲 ${Math.ceil(magnetActive/60)}s</div>`;
  if(x2Active>0)     c.innerHTML+=`<div class="pui x2">✨ X2</div>`;
}

/* ═══════════════ UPDATE OBSTACLES ═══════════════ */
function updateObstacles(){
  obstacles=obstacles.filter(o=>{
    o.y+=o.speed+gspd*.18;
    drawObstacle(o);
    // collision
    if(inv<=0){
      const bk=1-getUpgVal('bodykit');
      const dx=Math.abs(player.x-o.x),dy=Math.abs(player.y-o.y);
      const hw=(player.w+o.w)*.38*bk,hh=(player.h+o.h)*.38*bk;
      if(dx<hw&&dy<hh){
        if(shieldActive>0){shieldActive=0;spawnShieldHit();inv=60;updatePowerupHUD();}
        else{spawnCrash(player.x,player.y);spawnHitFlash();lives--;combo=1;inv=95;updateHUD();if(lives<=0)endGame();}
      }
    }
    // oil slick special: slow player
    if(o.type==='oil'){
      const dx=Math.abs(player.x-o.x),dy=Math.abs(player.y-o.y);
      if(dx<22&&dy<14) gspd=Math.max(gspd*.96,bspd*.7);
    }
    return o.y<H+60;
  });
}

/* ═══════════════ SPAWN TRAFFIC & OBSTACLES ═══════════════ */
function spawnCar(){
  const li=Math.floor(Math.random()*3),col=TCOLS[Math.floor(Math.random()*TCOLS.length)];
  if(cars.some(c=>c.lane===li&&c.y>-200))return;
  const isTruck=level>=4&&Math.random()<.15;
  const spd=gspd*(.4+Math.random()*.65)*(weather==='storm'?.8:1);
  cars.push({x:lanes[li],y:isTruck?-120:-90,w:isTruck?52:40,h:isTruck?100:70,lane:li,color:col[0],roof:col[1],speed:spd,nm:false,type:isTruck?'truck':'car'});
  if(Math.random()<.25) spawnCoin(lanes[li]+(Math.random()-.5)*24,-25);
  if(level>=5&&Math.random()<.08) spawnPowerup(lanes[li]+(Math.random()-.5)*20,-30);
}
function trySpawnObstacle(){
  if(level<2) return;
  const li=Math.floor(Math.random()*3);
  if(obstacles.some(o=>o.lane===li&&o.y>-100)) return;
  const prob=Math.min(.018,level*.003);
  if(Math.random()>prob) return;
  const types=level>=3?OBS_TYPES:['barrel','cone'];
  const type=types[Math.floor(Math.random()*types.length)];
  obstacles.push({x:lanes[li],y:-40,w:type==='barrel'?28:22,h:type==='barrel'?32:24,lane:li,type,speed:gspd*.35});
}

/* ═══════════════ LANE MOVEMENT ═══════════════ */
function moveLane(d){
  const nl=player.lane+d;
  if(nl>=0&&nl<3){
    player.lane=nl;player.targetX=lanes[nl];
    player.tilt=d*.1;
    setTimeout(()=>{player.tilt*=.35;},100);
    setTimeout(()=>{player.tilt=0;},230);
  }
}

/* ═══════════════ COLLISION (CARS) ═══════════════ */
function checkCol(){
  if(inv>0)return;
  const bk=1-getUpgVal('bodykit');
  cars.forEach(c=>{
    const dx=Math.abs(player.x-c.x),dy=Math.abs(player.y-c.y);
    if(dx<(player.w+c.w)*.4*bk&&dy<(player.h+c.h)*.4*bk){
      if(shieldActive>0){shieldActive=0;spawnShieldHit();inv=60;combo=Math.max(1,combo-1);updatePowerupHUD();}
      else{spawnCrash(player.x,player.y);spawnHitFlash();lives--;combo=1;inv=95;updateHUD();if(lives<=0)endGame();}
    } else if(dx<(player.w+c.w)*.62*bk&&dy<(player.h+c.h)*.55*bk&&!c.nm){
      c.nm=true;score+=35*combo*(x2Active>0?2:1);combo=Math.min(combo+1,12);
      missionStats.dodges=(missionStats.dodges||0)+1;
      missionStats.maxCombo=Math.max(missionStats.maxCombo||0,combo);
      checkMission();spawnNearMiss(player.x,player.y);updateHUD();
    }
  });
}

/* ═══════════════ HUD ═══════════════ */
function updateHUD(){
  document.getElementById('sv').textContent=score.toLocaleString();
  document.getElementById('lv').textContent=level;
  document.getElementById('coinCount').textContent=totalCoins.toLocaleString();
  const ce=document.getElementById('cmv');
  ce.textContent='x'+combo;
  ce.style.fontSize=(18+combo*2.5)+'px';
  ce.style.color=combo>=8?'#ff3355':combo>=5?'#ff66cc':combo>=3?'#ffaa00':'#ff9900';
  [1,2,3].forEach(i=>document.getElementById('l'+i).className='lp'+(lives<i?' lost':''));
  const spd=Math.min(100,((gspd-bspd)/(bspd*1.6))*100+22);
  document.getElementById('speedFill').style.width=spd+'%';
  document.getElementById('speedFill').style.background=boosting
    ?'linear-gradient(90deg,#ff5500,#ffcc00)':'linear-gradient(90deg,#00f0ff,#7700ff)';
  document.getElementById('boostFill').style.width=boostChg+'%';
  document.getElementById('shieldFill').style.width=(shieldActive/600*100)+'%';
}

/* ═══════════════ GAME LOOP ═══════════════ */
function loop(){
  if(state!=='playing')return;
  fc++;

  // Boost
  const boostMult=getUpgVal('turbo');
  const nitroDrain=0.85/boostMult;
  if(keys['Space']&&boostChg>0){
    boosting=true;boostChg=Math.max(0,boostChg-nitroDrain);
    gspd=bspd*1.8*getUpgVal('engine');
    if(boostChg===0&&!keys['Space_was']) missionStats.turbos=(missionStats.turbos||0)+1;
  } else {boosting=false;gspd+=(bspd-gspd)*.1;}
  if(inv>0)inv--;

  // Powerup timers
  if(shieldActive>0){shieldActive--;updatePowerupHUD();}
  if(magnetActive>0){magnetActive--;if(magnetActive%60===0)updatePowerupHUD();}
  if(x2Active>0){x2Active--;if(x2Active%60===0)updatePowerupHUD();}

  // Level up every 550 frames
  if(fc%550===0){
    level++;
    bspd=Math.min(12,3+level*.45)*getUpgVal('engine');
    missionStats.level=level;
    checkMission();
    const lu=document.getElementById('lvup');lu.style.opacity='1';
    setTimeout(()=>lu.style.opacity='0',1400);
    // weather changes
    if(level%3===0){
      const w=WEATHERS[Math.floor(Math.random()*WEATHERS.length)];
      setWeather(w);
    }
  }

  // Passive score, boost recharge, distance
  if(fc%10===0){
    const mult=x2Active>0?2:1;
    score+=combo*mult;
    boostChg=Math.min(100,boostChg+.28*getUpgVal('nitroRgn'));
    missionStats.dist=(missionStats.dist||0)+Math.round(gspd*10);
    checkMission();updateMissionUI();
  }

  bgO+=gspd;
  spawnT++;
  const spawnRate=Math.max(28,90-level*5);
  if(spawnT>spawnRate){spawnT=0;spawnCar();}
  trySpawnObstacle();

  // Smooth player movement
  player.x+=(player.targetX-player.x)*.2;
  cars=cars.filter(c=>c.y<H+130);
  cars.forEach(c=>{c.y+=c.speed+gspd*.18;});
  checkCol();updateHUD();

  /* ── RENDER ── */
  ctx.clearRect(0,0,W,H);

  // Sky
  const sk=weather==='storm'?['#020005','#08010d']:weather==='fog'?['#0a0e18','#0d1520']:['#000410','#04091a'];
  const sg=ctx.createLinearGradient(0,0,0,100);sg.addColorStop(0,sk[0]);sg.addColorStop(1,sk[1]);
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,100);

  // Stars (hidden during storm/fog)
  if(weather==='clear'||weather==='rain'){
    [[28,10],[52,22],[9,38],[68,14],[418,7],[458,28],[442,48],[15,55],[72,6],[395,35],[140,18],[340,42],[200,8],[300,30],[380,15]].forEach(([sx,sy])=>{
      const a=weather==='rain'?.2:(.45+Math.sin(fc*.018+sx)*.3);
      ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy,.85,0,Math.PI*2);ctx.fill();
    });ctx.globalAlpha=1;
  }

  drawBuildings();drawRoad();

  // Boost trail
  if(boosting){
    const btg=ctx.createLinearGradient(player.x,player.y,player.x,player.y+110);
    btg.addColorStop(0,'rgba(255,110,0,.95)');btg.addColorStop(.4,'rgba(255,200,0,.45)');btg.addColorStop(1,'transparent');
    ctx.fillStyle=btg;ctx.beginPath();
    ctx.moveTo(player.x-12,player.y+36);ctx.lineTo(player.x+12,player.y+36);
    ctx.lineTo(player.x+5,player.y+110);ctx.lineTo(player.x-5,player.y+110);ctx.fill();
    ctx.strokeStyle='rgba(255,160,0,.15)';ctx.lineWidth=1;
    for(let i=0;i<10;i++){const lx=RX+Math.random()*RW,ly=Math.random()*H;ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx,ly+70);ctx.stroke();}
  }

  // X2 aura
  if(x2Active>0){
    const a=.08+Math.sin(fc*.1)*.05;
    ctx.fillStyle=`rgba(255,200,0,${a})`;ctx.fillRect(RX,0,RW,H);
  }

  updateCoins();
  updatePowerupItems();
  updateObstacles();
  cars.forEach(c=>drawCar(c.x,c.y,c.w,c.h,c.color,c.roof,false,0,c.type));
  if(fc%3===0) spawnExh(player.x,player.y);
  updateParticles();
  drawCar(player.x,player.y,player.w,player.h,'#00aaff','#006699',true,player.tilt);

  drawWeather();

  rafId=requestAnimationFrame(loop);
}

/* ═══════════════ START / END ═══════════════ */
function startGame(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  state='playing';score=0;level=1;lives=3+getUpgLv('lives');combo=1;
  gspd=3;bspd=3*getUpgVal('engine');fc=0;spawnT=0;boostChg=0;boosting=false;inv=0;bgO=0;dashO=0;
  sessionCoins=0;shieldActive=0;magnetActive=0;x2Active=0;
  weather='clear';fogAlpha=0;rainDrops=[];lightning={active:false,timer:120};
  player.lane=1;player.x=lanes[1];player.targetX=lanes[1];player.tilt=0;
  cars=[];parts=[];sparks=[];coins=[];obstacles=[];powerupItems=[];
  initBuild();pickMission();
  document.getElementById('ov').style.display='none';
  updateHUD();updatePowerupHUD();
  rafId=requestAnimationFrame(loop);
}

function endGame(){
  state='gameover';
  cancelAnimationFrame(rafId);rafId=null;
  saveData();
  if(score>hiScore){hiScore=score;localStorage.setItem('ncr2HiScore',hiScore);}
  if(level>hiLevel){hiLevel=level;localStorage.setItem('ncr2HiLevel',hiLevel);}

  const ov=document.getElementById('ov');
  ov.style.display='flex';
  ov.innerHTML=`
    <h1>GAME</h1>
    <div class="sub">OVER</div>
    <div class="hl" style="margin-bottom:3px;letter-spacing:3px;color:#ffffff66;">PUNTUACIÓN FINAL</div>
    <div class="sbig">${score.toLocaleString()}</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:12px;color:#aa88ff;letter-spacing:2px;margin-bottom:4px;">NIVEL ${level} &nbsp;|&nbsp; 🪙 +${sessionCoins} monedas</div>
    <div class="hirow">
      <div class="hibox"><div class="hilbl">RÉCORD</div><div class="hival">${hiScore.toLocaleString()}</div></div>
      <div class="hibox"><div class="hilbl">MEJOR NIV</div><div class="hival">${hiLevel}</div></div>
      <div class="hibox"><div class="hilbl">TOTAL 🪙</div><div class="hival">${totalCoins}</div></div>
    </div>
    <div class="btn" onclick="startGame()">REINTENTAR</div>
    <div class="btn secondary" onclick="openShop()" style="margin-top:6px;font-size:11px;padding:10px 36px;">🛒 MEJORAR AUTO</div>
    <div class="ch">← → MOVER &nbsp;|&nbsp; ESPACIO TURBO</div>
  `;
}

/* ═══════════════ INIT ═══════════════ */
function showMenu(){
  document.getElementById('hisc').textContent=hiScore.toLocaleString();
  document.getElementById('hilv').textContent=hiLevel;
  document.getElementById('hiCoins').textContent=totalCoins;
  initBuild();
  ctx.clearRect(0,0,W,H);
  const sg=ctx.createLinearGradient(0,0,0,H);sg.addColorStop(0,'#000410');sg.addColorStop(1,'#04091a');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
  drawBuildings();drawRoad();
  drawCar(W/2,H-130,42,72,'#00aaff','#006699',true,0);
}
showMenu();
</script>
